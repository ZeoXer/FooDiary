services:
  backend:
    container_name: fooDairy-backend
    build: 
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - 8080:8080
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./backend/logs:/var/log/backend
    restart: always
    networks:
      - fooDairy
  
  redis:
    image: redis:6.2
    container_name: fooDairy-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - fooDairy

networks:
  fooDairy: